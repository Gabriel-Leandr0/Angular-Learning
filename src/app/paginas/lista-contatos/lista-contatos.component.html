<app-container>
  <app-cabecalho></app-cabecalho>

  <input
    type="search"
    placeholder="Filtrar contatos"
    [(ngModel)]="filtroPorTexto"
  />

  <section class="adicionar-contato">
    <button class="botao-adicionar-contato" routerLink="/formulario">
      <img src="assets/plus.png" />
      <span>Adicionar contato</span>
    </button>
  </section>

  @for (letra of alfabeto; track letra) {
  <app-separador>
    {{ letra }}
  </app-separador>

  @for (contato of filtrarContatos(letra); track contato.id) {
  <app-contato
    [nome]="contato.nome"
    [telefone]="contato.telefone"
  ></app-contato>
  } }
</app-container>
