<app-container>

    <header>
        <section class="cabecalho-link">
            <img src="assets/logo.png" alt="logo">
        </section>

        <section class="cabecalho-contato">
            <img src="assets/adicionar-contato.png" alt="adicionar-contato">
            <h1>Adicionar Contato</h1>
        </section>
    </header>

    <form [formGroup]="contatoForm">
        <label for="nome">Nome</label>
        <input
            type="text"
            id="nome"
            placeholder="Digite o nome do contato"
            formControlName="nome"
         />
        <label for="telefone">Telefone</label>
        <input
            type="text"
            id="telefone"
            placeholder="Digite o telefone do contato"
            formControlName="telefone"
         />
        <label for="email">Email</label>
        <input
            type="email"
            id="email"
            placeholder="Digite o email do contato"
            formControlName="email"
         />

        <app-separador></app-separador>

        <label for="nascimento">Data de nascimento</label>
        <input
            type="date"
            id="nascimento"
            placeholder="Insira a data de nascimento"
            formControlName="nascimento"
        />
        <label for="redes">Redes sociais</label>
        <div class="input-container">
            <span class="span-http">http://</span>
        <input
            type="url"
            id="redes"
            placeholder="Adicione a URL da rede social"
            formControlName="redes"
         />
        </div>

        <label for="observacoes">Observações</label>
        <textarea
            type="text"
            id="observacoes"
            placeholder="Coloque observações nesse espaço.  Exemplo: “Instrutora da academia “Nova Imagem”, amiga da Júlia”."
            formControlName="observacoes"
         ></textarea>

         <section class="botoes">
            <button class="botao-cancelar" type="button">Cancelar</button>
            <button class="botao-salvar" type="submit">Salvar Contato</button>
         </section>

    </form>

</app-container>
