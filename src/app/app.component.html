<app-formulario-contato></app-formulario-contato>

<app-container>
  <app-cabecalho></app-cabecalho>

<input
  type="search"
  placeholder="Filtrar contatos"
  [(ngModel)]="filtroPorTexto"
 />
 
  @for (letra of alfabeto; track letra) {
    <app-separador>
      {{ letra }}
    </app-separador>

    @for (contato of filtrarContatos(letra); track contato.id) {
    <app-contato [nome]="contato.nome" [telefone]="contato.telefone" ></app-contato>
    }
  }
</app-container>
